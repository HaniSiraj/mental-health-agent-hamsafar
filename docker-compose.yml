version: '3.8'

services:
  # ----------------------------------------------------------------------------
  # 1. REDIS: Stateful session storage & memory store
  # ----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: mh_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ----------------------------------------------------------------------------
  # 2. FASTAPI BACKEND: LangGraph Cognitive Brain Server
  # ----------------------------------------------------------------------------
  backend:
    build: .
    container_name: mh_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # 3. N8N: Visual workflow & pipeline integration engine
  # ----------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: mh_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-secure_default_key_123}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-admin}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  n8n_data:
